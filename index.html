<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pogoda – Sielata</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0b0f1a;
    color: #e2e8f0;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    min-height: 100vh;
    padding: 1.5rem;
  }

  header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1.25rem;
    padding-bottom: 1rem;
    border-bottom: 1px solid #1a2035;
  }

  header h1 {
    font-size: 1.2rem;
    font-weight: 600;
    color: #64748b;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  header h1 span { color: #38bdf8; }

  #last-update { font-size: 0.75rem; color: #334155; }

  .condition-card {
    background: #111827;
    border: 1px solid #1a2035;
    border-radius: 1rem;
    padding: 1.25rem 1.75rem;
    margin-bottom: 0.875rem;
    display: flex;
    align-items: center;
    gap: 1.5rem;
  }

  #condition-icon-wrap {
    flex-shrink: 0;
    width: 72px;
    height: 72px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #condition-label {
    font-size: 2rem;
    font-weight: 700;
    color: #f1f5f9;
    line-height: 1.1;
  }

  #condition-sub {
    font-size: 0.7rem;
    color: #374151;
    margin-top: 0.35rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  @keyframes spin-slow  { to { transform: rotate(360deg); } }
  @keyframes pulse-soft { 0%,100% { opacity:1; } 50% { opacity:.5; } }
  @keyframes drop       { 0% { transform:translateY(0); opacity:1; } 100% { transform:translateY(9px); opacity:0; } }
  @keyframes float      { 0%,100% { transform:translateY(0); } 50% { transform:translateY(-3px); } }
  @keyframes flicker    { 0%,100% { opacity:1; } 40% { opacity:.2; } 60% { opacity:.9; } }

  .sun-rays  { transform-box:fill-box; transform-origin:center; animation: spin-slow 30s linear infinite; }
  .moon-icon { animation: float 4s ease-in-out infinite; }
  .cloud-anim{ animation: float 5s ease-in-out infinite; }
  .rain-d1   { animation: drop 1.1s ease-in 0s    infinite; }
  .rain-d2   { animation: drop 1.1s ease-in .28s  infinite; }
  .rain-d3   { animation: drop 1.1s ease-in .55s  infinite; }
  .rain-d4   { animation: drop 1.1s ease-in .83s  infinite; }
  .lightning { animation: flicker 1.8s ease-in-out infinite; }

  .grid-main {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 0.875rem;
    margin-bottom: 0.875rem;
  }

  .card {
    background: #111827;
    border: 1px solid #1a2035;
    border-radius: 1rem;
    padding: 1.1rem 1.25rem 1.25rem;
    position: relative;
    overflow: hidden;
  }

  .card::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--accent, #38bdf8);
    border-radius: 1rem 1rem 0 0;
    opacity: .8;
  }

  .label {
    font-size: 0.65rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .12em;
    color: #374151;
    margin-bottom: .6rem;
  }

  .value {
    font-size: 3rem;
    font-weight: 700;
    line-height: 1;
    color: var(--accent, #38bdf8);
    font-variant-numeric: tabular-nums;
  }

  .unit { font-size: 1rem; font-weight: 400; color: #4b5563; margin-left: .15rem; }
  .sub  { font-size: .72rem; color: #374151; margin-top: .5rem; }

  .card-temp     { --accent: #fb923c; }
  .card-humidity { --accent: #38bdf8; }
  .card-pressure { --accent: #a78bfa; }
  .card-wind     { --accent: #34d399; }
  .card-rain     { --accent: #60a5fa; }

  .compass-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-top: .75rem;
    gap: .3rem;
  }

  #wind-dir-label { font-size: .7rem; color: #4b5563; letter-spacing: .05em; }

  .rain-bar-track {
    margin-top: .9rem;
    height: 6px;
    background: #1a2035;
    border-radius: 3px;
    overflow: hidden;
  }

  .rain-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, #2563eb, #60a5fa);
    border-radius: 3px;
    width: 0%;
    transition: width .8s ease;
  }

  .charts-grid {
    display: grid;
    grid-template-columns: 2fr 1fr;
    gap: .875rem;
  }

  @media (max-width: 700px) {
    .charts-grid       { grid-template-columns: 1fr; }
    .value             { font-size: 2.4rem; }
    #condition-label   { font-size: 1.5rem; }
  }

  .chart-card {
    background: #111827;
    border: 1px solid #1a2035;
    border-radius: 1rem;
    padding: 1.1rem 1.25rem 1rem;
  }

  .chart-title {
    font-size: .65rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .12em;
    color: #374151;
    margin-bottom: .9rem;
  }
</style>
</head>
<body>

<header>
  <h1>📡 Stacja <span>Sielata</span></h1>
  <div id="last-update">ładowanie…</div>
</header>

<div class="condition-card">
  <div id="condition-icon-wrap"></div>
  <div>
    <div id="condition-label">ładowanie…</div>
    <div id="condition-sub"></div>
  </div>
</div>

<div class="grid-main">

  <div class="card card-temp">
    <div class="label">Temperatura</div>
    <div class="value" id="temp">–<span class="unit">°C</span></div>
  </div>

  <div class="card card-humidity">
    <div class="label">Wilgotność</div>
    <div class="value" id="humidity">–<span class="unit">%</span></div>
  </div>

  <div class="card card-pressure">
    <div class="label">Ciśnienie</div>
    <div class="value" id="pressure">–<span class="unit" style="font-size:.8rem"> hPa</span></div>
  </div>

  <div class="card card-wind">
    <div class="label">Wiatr</div>
    <div class="value" id="wind">–<span class="unit"> km/h</span></div>
    <div class="compass-wrap">
      <svg id="compass" width="136" height="136" viewBox="0 0 68 68" xmlns="http://www.w3.org/2000/svg">
        <circle cx="34" cy="34" r="31" fill="none" stroke="#334155" stroke-width="1.5"/>
        <circle cx="34" cy="34" r="2" fill="#64748b"/>
        <line x1="34" y1="4"  x2="34" y2="10" stroke="#334155" stroke-width="1.5"/>
        <line x1="34" y1="58" x2="34" y2="64" stroke="#334155" stroke-width="1.5"/>
        <line x1="4"  y1="34" x2="10" y2="34" stroke="#334155" stroke-width="1.5"/>
        <line x1="58" y1="34" x2="64" y2="34" stroke="#334155" stroke-width="1.5"/>
        <text x="34" y="20" text-anchor="middle" fill="#cbd5e1" font-size="7" font-weight="700" font-family="system-ui">N</text>
        <text x="34" y="53" text-anchor="middle" fill="#94a3b8" font-size="7" font-weight="700" font-family="system-ui">S</text>
        <text x="52" y="37" text-anchor="middle" fill="#94a3b8" font-size="7" font-weight="700" font-family="system-ui">E</text>
        <text x="16" y="37" text-anchor="middle" fill="#94a3b8" font-size="7" font-weight="700" font-family="system-ui">W</text>
        <g id="compass-arrow" transform="rotate(0,34,34)">
          <polygon points="34,8 37,34 34,30 31,34" fill="#34d399" opacity=".9"/>
          <polygon points="34,60 37,34 34,38 31,34" fill="#64748b"/>
        </g>
      </svg>
      <div id="wind-dir-label">–</div>
    </div>
  </div>

  <div class="card card-rain">
    <div class="label">Opad</div>
    <div class="value" id="rain">–<span class="unit"> mm/h</span></div>
    <div class="rain-bar-track"><div class="rain-bar-fill" id="rain-bar"></div></div>
    <div class="sub" id="rain-desc"></div>
  </div>

</div>

<div class="charts-grid">
  <div class="chart-card">
    <div class="chart-title">Temperatura &amp; Wilgotność — ostatnie 24h</div>
    <canvas id="chart-th"></canvas>
  </div>
  <div class="chart-card">
    <div class="chart-title">Ciśnienie — ostatnie 24h</div>
    <canvas id="chart-p"></canvas>
  </div>
</div>

<script>
const CURRENT_URL = 'https://pogoda.sielata.com.pl/weather.php';
const HISTORY_URL = 'https://api.sielata.com.pl/public/api/weather/history';
const METEO_URL   = 'https://api.open-meteo.com/v1/forecast?latitude=50.226&longitude=19.324&current=weathercode,is_day&timezone=Europe%2FWarsaw';

const GRID = '#1a2035';
const TICK = '#4b5563';

const ICONS = {

  sunny: `<svg viewBox="0 0 60 60" width="68" height="68" xmlns="http://www.w3.org/2000/svg">
    <g class="sun-rays" stroke="#fbbf24" stroke-linecap="round" stroke-width="2.5">
      <line x1="30" y1="4"  x2="30" y2="12"/>
      <line x1="30" y1="48" x2="30" y2="56"/>
      <line x1="4"  y1="30" x2="12" y2="30"/>
      <line x1="48" y1="30" x2="56" y2="30"/>
      <line x1="12" y1="12" x2="18" y2="18"/>
      <line x1="42" y1="42" x2="48" y2="48"/>
      <line x1="48" y1="12" x2="42" y2="18"/>
      <line x1="18" y1="42" x2="12" y2="48"/>
    </g>
    <circle cx="30" cy="30" r="12" fill="#fbbf24"/>
  </svg>`,

  night: `<svg viewBox="0 0 60 60" width="68" height="68" xmlns="http://www.w3.org/2000/svg">
    <g class="moon-icon">
      <path d="M 38 10 Q 16 16 16 30 Q 16 44 38 50 Q 12 52 6 35 Q 0 18 18 10 Q 28 5 38 10 Z" fill="#94a3b8"/>
    </g>
    <circle cx="47" cy="13" r="2"   fill="#374151"/>
    <circle cx="54" cy="27" r="1.5" fill="#374151"/>
    <circle cx="46" cy="7"  r="1.2" fill="#374151"/>
  </svg>`,

  partlyCloudy: `<svg viewBox="0 0 70 58" width="76" height="63" xmlns="http://www.w3.org/2000/svg">
    <g opacity=".9">
      <circle cx="22" cy="21" r="10" fill="#fbbf24"/>
      <g class="sun-rays" stroke="#fbbf24" stroke-linecap="round" stroke-width="2">
        <line x1="22" y1="5"  x2="22" y2="11"/>
        <line x1="22" y1="31" x2="22" y2="37"/>
        <line x1="6"  y1="21" x2="12" y2="21"/>
        <line x1="32" y1="21" x2="38" y2="21"/>
        <line x1="11" y1="10" x2="15" y2="14"/>
        <line x1="29" y1="28" x2="33" y2="32"/>
        <line x1="33" y1="10" x2="29" y2="14"/>
      </g>
    </g>
    <g class="cloud-anim">
      <path d="M 14 52 Q 9 52 9 45 Q 9 38 18 37 Q 19 29 30 29 Q 41 29 43 37 Q 52 37 52 45 Q 52 52 44 52 Z" fill="#64748b"/>
    </g>
  </svg>`,

  partlyCloudyNight: `<svg viewBox="0 0 70 58" width="76" height="63" xmlns="http://www.w3.org/2000/svg">
    <g class="moon-icon" opacity=".85">
      <path d="M 28 6 Q 14 11 14 22 Q 14 33 28 38 Q 10 40 5 27 Q 0 14 14 7 Q 21 3 28 6 Z" fill="#94a3b8"/>
    </g>
    <g class="cloud-anim">
      <path d="M 20 52 Q 15 52 15 45 Q 15 38 24 37 Q 25 30 35 30 Q 45 30 47 38 Q 56 38 56 45 Q 56 52 48 52 Z" fill="#4b5563"/>
    </g>
  </svg>`,

  cloudy: `<svg viewBox="0 0 60 46" width="72" height="55" xmlns="http://www.w3.org/2000/svg">
    <g class="cloud-anim">
      <path d="M 4 36 Q 0 36 0 30 Q 0 23 9 22 Q 10 14 20 14 Q 30 14 32 22 Q 42 22 42 30 Q 42 36 35 36 Z" fill="#4b5563"/>
      <path d="M 14 42 Q 10 42 10 36 Q 10 29 19 28 Q 20 21 30 21 Q 40 21 42 28 Q 52 28 52 36 Q 52 42 45 42 Z" fill="#64748b"/>
    </g>
  </svg>`,

  fog: `<svg viewBox="0 0 60 52" width="72" height="62" xmlns="http://www.w3.org/2000/svg">
    <g class="cloud-anim">
      <path d="M 5 20 Q 1 20 1 14 Q 1 8 9 7 Q 10 1 19 1 Q 28 1 30 7 Q 39 7 39 14 Q 39 20 32 20 Z" fill="#4b5563"/>
    </g>
    <g stroke="#475569" stroke-linecap="round" stroke-width="2.5">
      <line x1="4"  y1="28" x2="56" y2="28"/>
      <line x1="8"  y1="36" x2="52" y2="36"/>
      <line x1="6"  y1="44" x2="54" y2="44"/>
    </g>
  </svg>`,

  drizzle: `<svg viewBox="0 0 60 56" width="68" height="64" xmlns="http://www.w3.org/2000/svg">
    <g class="cloud-anim">
      <path d="M 7 26 Q 3 26 3 20 Q 3 13 12 12 Q 13 5 23 5 Q 33 5 35 12 Q 45 12 45 20 Q 45 26 37 26 Z" fill="#64748b"/>
    </g>
    <g stroke="#93c5fd" stroke-linecap="round" stroke-width="2">
      <line class="rain-d1" x1="15" y1="34" x2="13" y2="42"/>
      <line class="rain-d2" x1="25" y1="34" x2="23" y2="42"/>
      <line class="rain-d3" x1="35" y1="34" x2="33" y2="42"/>
    </g>
  </svg>`,

  rain: `<svg viewBox="0 0 60 58" width="68" height="66" xmlns="http://www.w3.org/2000/svg">
    <g class="cloud-anim">
      <path d="M 5 24 Q 1 24 1 18 Q 1 11 10 10 Q 11 3 21 3 Q 31 3 33 10 Q 43 10 43 18 Q 43 24 35 24 Z" fill="#4b5563"/>
    </g>
    <g stroke="#3b82f6" stroke-linecap="round" stroke-width="2.5">
      <line class="rain-d1" x1="9"  y1="32" x2="6"  y2="44"/>
      <line class="rain-d2" x1="19" y1="32" x2="16" y2="44"/>
      <line class="rain-d3" x1="29" y1="32" x2="26" y2="44"/>
      <line class="rain-d4" x1="39" y1="32" x2="36" y2="44"/>
    </g>
  </svg>`,

  snow: `<svg viewBox="0 0 60 58" width="68" height="66" xmlns="http://www.w3.org/2000/svg">
    <g class="cloud-anim">
      <path d="M 5 24 Q 1 24 1 18 Q 1 11 10 10 Q 11 3 21 3 Q 31 3 33 10 Q 43 10 43 18 Q 43 24 35 24 Z" fill="#4b5563"/>
    </g>
    <g fill="#bfdbfe" font-size="15" font-family="system-ui" text-anchor="middle">
      <text x="10" y="44" class="rain-d1">❄</text>
      <text x="24" y="42" class="rain-d2">❄</text>
      <text x="38" y="44" class="rain-d3">❄</text>
      <text x="17" y="54" class="rain-d4">❄</text>
      <text x="31" y="54" class="rain-d1">❄</text>
    </g>
  </svg>`,

  thunder: `<svg viewBox="0 0 60 60" width="68" height="68" xmlns="http://www.w3.org/2000/svg">
    <g class="cloud-anim">
      <path d="M 5 24 Q 1 24 1 18 Q 1 11 10 10 Q 11 3 21 3 Q 31 3 33 10 Q 43 10 43 18 Q 43 24 35 24 Z" fill="#374151"/>
    </g>
    <g stroke="#60a5fa" stroke-linecap="round" stroke-width="2" opacity=".5">
      <line class="rain-d1" x1="7"  y1="30" x2="5"  y2="42"/>
      <line class="rain-d3" x1="37" y1="30" x2="35" y2="42"/>
    </g>
    <polygon class="lightning" points="26,26 19,42 25,42 21,57 33,36 27,36 31,26" fill="#fbbf24"/>
  </svg>`
};

function wmoCondition(code, isDay) {
  const d = isDay === 1;
  if (code === 0)                      return { label: d ? 'Bezchmurnie'           : 'Bezchmurna noc',      icon: d ? 'sunny'            : 'night' };
  if (code === 1)                      return { label: d ? 'Przeważnie słonecznie' : 'Przeważnie pogodnie', icon: d ? 'sunny'            : 'night' };
  if (code === 2)                      return { label: 'Częściowe zachmurzenie',    icon: d ? 'partlyCloudy' : 'partlyCloudyNight' };
  if (code === 3)                      return { label: 'Zachmurzenie całkowite',    icon: 'cloudy' };
  if ([45,48].includes(code))          return { label: 'Mgła',                      icon: 'fog' };
  if ([51,53,55].includes(code))       return { label: 'Mżawka',                    icon: 'drizzle' };
  if ([61,63,65].includes(code))       return { label: 'Deszcz',                    icon: 'rain' };
  if ([71,73,75,77].includes(code))    return { label: 'Śnieg',                     icon: 'snow' };
  if ([80,81,82].includes(code))       return { label: 'Przelotne opady',           icon: 'rain' };
  if ([85,86].includes(code))          return { label: 'Przelotny śnieg',           icon: 'snow' };
  if ([95,96,99].includes(code))       return { label: 'Burza',                     icon: 'thunder' };
  return { label: 'Zmienne', icon: 'cloudy' };
}

function dirLabel(deg) {
  const d = ['N','NE','E','SE','S','SW','W','NW'];
  return d[Math.round(((deg % 360) + 360) % 360 / 45) % 8];
}

function rainDesc(mm) {
  if (!mm || mm === 0) return 'brak opadu';
  if (mm < 0.5)  return 'mżawka';
  if (mm < 2.5)  return 'lekki deszcz';
  if (mm < 7.5)  return 'umiarkowany deszcz';
  return 'intensywny deszcz';
}

async function loadCurrent() {
  const res = await fetch(CURRENT_URL);
  const d   = await res.json();
  document.getElementById('temp').innerHTML     = `${d.temp}<span class="unit">°C</span>`;
  document.getElementById('humidity').innerHTML = `${d.humidity}<span class="unit">%</span>`;
  document.getElementById('pressure').innerHTML = `${d.pressure}<span class="unit" style="font-size:.8rem"> hPa</span>`;
  document.getElementById('wind').innerHTML     = `${d.wind}<span class="unit"> km/h</span>`;
  document.getElementById('rain').innerHTML     = `${d.rain}<span class="unit"> mm/h</span>`;
  document.getElementById('compass-arrow').setAttribute('transform', `rotate(${d.windDir},34,34)`);
  document.getElementById('wind-dir-label').textContent = dirLabel(d.windDir);
  const pct = Math.min((d.rain / 20) * 100, 100);
  document.getElementById('rain-bar').style.width = pct + '%';
  document.getElementById('rain-desc').textContent = rainDesc(d.rain);
  document.getElementById('last-update').textContent = 'Ostatni odczyt: ' + d.time;
}

async function loadCondition() {
  const res  = await fetch(METEO_URL);
  const data = await res.json();
  const code  = data.current.weathercode;
  const isDay = data.current.is_day;
  const { label, icon } = wmoCondition(code, isDay);
  document.getElementById('condition-icon-wrap').innerHTML = ICONS[icon] ?? ICONS.cloudy;
  document.getElementById('condition-label').textContent   = label;
  document.getElementById('condition-sub').textContent     = isDay === 1 ? 'Dzień' : 'Noc';
}

let chartTH, chartP;

async function loadHistory() {
  const res  = await fetch(HISTORY_URL);
  const data = await res.json();
  const labels    = data.map(r => { const dt = new Date(r.time * 1000); return dt.getHours().toString().padStart(2,'0') + ':' + dt.getMinutes().toString().padStart(2,'0'); });
  const temps     = data.map(r => r.temp);
  const hums      = data.map(r => r.humidity);
  const pressures = data.map(r => r.pressure);
  const xScale = { ticks: { color: TICK, maxTicksLimit: 7, font: { size: 10 } }, grid: { color: GRID } };
  if (chartTH) chartTH.destroy();
  chartTH = new Chart(document.getElementById('chart-th'), {
    type: 'line',
    data: { labels, datasets: [
      { label: 'Temp (°C)',      data: temps,     borderColor: '#fb923c', backgroundColor: 'rgba(251,146,60,.08)', fill: true,  tension: .35, pointRadius: 0, yAxisID: 'y'  },
      { label: 'Wilgotność (%)', data: hums,      borderColor: '#38bdf8', backgroundColor: 'transparent',          fill: false, tension: .35, pointRadius: 0, yAxisID: 'y1' }
    ]},
    options: { responsive: true, animation: false, interaction: { mode: 'index', intersect: false },
      plugins: { legend: { labels: { color: TICK, boxWidth: 10, font: { size: 11 } } } },
      scales: { x: xScale, y: { position: 'left',  ticks: { color: '#fb923c', font: { size: 10 } }, grid: { color: GRID } }, y1: { position: 'right', ticks: { color: '#38bdf8', font: { size: 10 } }, grid: { drawOnChartArea: false } } }
    }
  });
  if (chartP) chartP.destroy();
  chartP = new Chart(document.getElementById('chart-p'), {
    type: 'line',
    data: { labels, datasets: [{ label: 'Ciśnienie (hPa)', data: pressures, borderColor: '#a78bfa', backgroundColor: 'rgba(167,139,250,.08)', fill: true, tension: .35, pointRadius: 0 }] },
    options: { responsive: true, animation: false, interaction: { mode: 'index', intersect: false },
      plugins: { legend: { labels: { color: TICK, boxWidth: 10, font: { size: 11 } } } },
      scales: { x: xScale, y: { ticks: { color: '#a78bfa', font: { size: 10 } }, grid: { color: GRID } } }
    }
  });
}

async function refresh() {
  await Promise.all([loadCurrent(), loadCondition(), loadHistory()]);
}

refresh();
setInterval(refresh, 5 * 60 * 1000);
</script>
</body>
</html>
